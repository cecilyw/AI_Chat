name: SLA Check

on:
  schedule:
    - cron: '0 2 * * *'        # 每天 10:00 北京时间 (UTC+2)
  workflow_dispatch:            # 允许手动触发

permissions:
  issues: write
  contents: read

jobs:
  sla-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Scan overdue issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/sla_check.py
